<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b10" />
<title>Haven — your friends and your family</title>
<meta name="description" content="Haven is a private, peer-to-peer social app for your circle. End-to-end encrypted, no servers, no ads, no tracking. Get the app." />
<style>
  :root{
    --violet:#7C3AED; --pink:#EC4899; --amber:#F59E0B;
    --brand:linear-gradient(135deg,var(--violet),var(--pink),var(--amber));
    --bg:#0b0b10; --card:rgba(255,255,255,.055); --card-border:rgba(255,255,255,.10);
    --text:#f5f5f7; --text2:rgba(245,245,247,.66); --text3:rgba(245,245,247,.42);
    --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    color:var(--text); background:var(--bg); line-height:1.5;
    background-image:
      radial-gradient(60% 40% at 85% -8%, rgba(236,72,153,.20), transparent 60%),
      radial-gradient(55% 40% at -5% 6%, rgba(124,58,237,.22), transparent 60%);
    display:flex; flex-direction:column; align-items:center; padding:32px 20px 48px;
  }
  .wrap{width:100%;max-width:560px;text-align:center}
  .logo{font-weight:800;font-size:40px;letter-spacing:-1px;
    background:var(--brand);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
  .tag{color:var(--text2);font-size:17px;margin:0 auto 28px;max-width:34ch}
  .card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
    padding:26px 22px;margin:0 auto 18px;text-align:left}
  .btn{display:block;width:100%;border:none;border-radius:999px;padding:15px 18px;font-size:16px;font-weight:700;
    cursor:pointer;text-align:center;text-decoration:none;color:#fff;background:var(--brand);margin-top:6px}
  .btn.ghost{background:transparent;border:1.5px solid rgba(255,255,255,.22);color:var(--text);margin-top:12px}
  .muted{color:var(--text3);font-size:13px;margin-top:14px;text-align:center}
  h2{margin:0 0 6px;font-size:22px}
  ul.points{list-style:none;padding:0;margin:14px 0 0}
  ul.points li{display:flex;gap:10px;align-items:flex-start;margin:10px 0;color:var(--text2);font-size:15px}
  ul.points li b{color:var(--text)}
  .dot{flex:0 0 auto;width:8px;height:8px;border-radius:999px;margin-top:8px;background:var(--brand)}
  .platforms{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
  .pill{font-size:13px;color:var(--text2);background:var(--card);border:1px solid var(--card-border);
    border-radius:999px;padding:7px 13px}
  a.inline{color:var(--pink);text-decoration:none}
  #status{min-height:18px}
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="logo">Haven</div>
    <p class="tag">Your friends <i>and</i> your family. A private, end-to-end-encrypted circle — no servers, no ads, no tracking.</p>
    <div id="content"></div>
  </div>

<script>
// Honest, server-free landing page. Haven is a NATIVE app (iOS/macOS, with Linux/Windows relay
// + desktop on the way). The browser can't be a peer on Haven's peer-to-peer network, so this
// page's only job is to open the app — and to carry invite links to it.
const APP_STORE_URL = "";   // set when live on the App Store
const LEARN_URL = "https://wemiller.com/apps/haven/";

// An invite payload "<id>.<verify>" rides in the URL fragment.
function detectInvite(){
  const h = location.hash.replace(/^#/, "");
  const dot = h.indexOf(".");
  if(dot < 1) return null;
  const id = h.slice(0, dot), verify = h.slice(dot + 1);
  if(!id || !verify) return null;
  return { appUrl: `haven://invite#${id}.${verify}` };
}

// Open the native app via its custom scheme (a top-level navigation on the user's tap is the
// reliable way; modern browsers block silent/iframe launches).
function openInApp(appUrl){
  const status = document.getElementById("status");
  let left = false;
  const onHide = () => { left = true; };
  document.addEventListener("visibilitychange", onHide, { once:true });
  setTimeout(() => {
    document.removeEventListener("visibilitychange", onHide);
    if(!left && status) status.textContent = "Don't have Haven yet? Install it, then tap the invite link again.";
  }, 1500);
  window.location.href = appUrl;
}

function getAppButtons(){
  if(APP_STORE_URL) return `<a class="btn" href="${APP_STORE_URL}">Get Haven on the App Store</a>`;
  return `<a class="btn" href="${LEARN_URL}">Learn more &amp; get Haven</a>`;
}

function render(){
  const inv = detectInvite();
  const el = document.getElementById("content");
  if(inv){
    el.innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:42px">👋</div>
        <h2>You've been invited to Haven</h2>
        <p style="color:var(--text2);margin:6px 0 4px">Open the invite in the Haven app to join the circle securely.</p>
        <button class="btn" id="open">Open in the Haven app</button>
        ${getAppButtons().replace('class="btn"','class="btn ghost"')}
        <div id="status" class="muted"></div>
      </div>`;
    document.getElementById("open").onclick = () => openInApp(inv.appUrl);
  } else {
    el.innerHTML = `
      <div class="card">
        <h2>A social app just for your people</h2>
        <ul class="points">
          <li><span class="dot"></span><span><b>End-to-end, post-quantum encrypted.</b> Only your circle can read what you share.</span></li>
          <li><span class="dot"></span><span><b>No servers, no accounts, no tracking.</b> Your posts move peer-to-peer between your devices.</span></li>
          <li><span class="dot"></span><span><b>Photos, videos, stories, messages &amp; calls</b> — shared privately with the people you choose.</span></li>
        </ul>
        ${getAppButtons()}
        <div class="platforms">
          <span class="pill">iPhone &amp; iPad</span><span class="pill">Mac</span>
          <span class="pill">Linux / Windows relay</span>
        </div>
        <div id="status" class="muted">Have an invite link? Open it on your phone to join a circle.</div>
      </div>`;
  }
}
render();
window.addEventListener("hashchange", render);
</script>
</body>
</html>
