name: desktop

# Build the Tauri desktop client for Windows + Linux. Produces installers as artifacts:
# Windows .msi + NSIS .exe (wrap into MSIX for the Microsoft Store — see docs/WINDOWS-PORT.md),
# Linux .deb + .AppImage. macOS is built by the Apple pipeline, not here.

on:
  push:
    branches: [main, windows-desktop]
    paths:
      - "desktop/**"
      - "core/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "core/**"
  workflow_dispatch:

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            desktop/src-tauri
      - name: Unit tests (core + desktop wire/call)
        run: |
          cargo test -p haven-s3 --manifest-path core/Cargo.toml
          # System webkit deps so the desktop lib's tauri build deps resolve.
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev
          cargo test --manifest-path desktop/src-tauri/Cargo.toml --lib

  build:
    needs: test-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf file

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (GUI + headless relay)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: haven-${{ matrix.name }}
          path: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: ignore
